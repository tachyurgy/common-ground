default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: common_ground_development

test:
  <<: *default
  database: common_ground_test

production:
  primary: &primary_production
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
    prepared_statements: false
    advisory_locks: false
  cache:
    <<: *primary_production
    schema_dump: false
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    schema_dump: false
    migrations_paths: db/queue_migrate
