databases:
  - name: common-ground-db
    plan: free
    databaseName: common_ground
    user: common_ground

services:
  - type: web
    name: common-ground-api
    runtime: ruby
    plan: free
    rootDir: api
    buildCommand: bundle install && bundle exec rails db:migrate
    startCommand: bundle exec puma -C config/puma.rb
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: common-ground-db
          property: connectionString
      - key: RAILS_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: S3_BUCKET
        value: common-ground-audio
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
